<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VisaFlowX</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="i-dashboard" viewBox="0 0 24 24"><path d="M4 13h7V4H4v9Zm0 7h7v-5H4v5Zm9 0h7v-9h-7v9Zm0-16v5h7V4h-7Z"/></symbol>
      <symbol id="i-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7L8 5Z"/></symbol>
      <symbol id="i-stop" viewBox="0 0 24 24"><path d="M6 6h12v12H6V6Z"/></symbol>
      <symbol id="i-save" viewBox="0 0 24 24"><path d="M5 4h12l2 2v14H5V4Zm3 2v5h8V6H8Zm0 10v2h8v-2H8Z"/></symbol>
      <symbol id="i-clock" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18Zm1 5v4.4l3 1.8-1 1.7-4-2.4V8h2Z"/></symbol>
      <symbol id="i-bell" viewBox="0 0 24 24"><path d="M12 22a2.5 2.5 0 0 0 2.4-2h-4.8A2.5 2.5 0 0 0 12 22Zm7-6-2-2v-4a5 5 0 0 0-4-4.9V3h-2v2.1A5 5 0 0 0 7 10v4l-2 2v2h14v-2Z"/></symbol>
      <symbol id="i-key" viewBox="0 0 24 24"><path d="M7.5 14A5.5 5.5 0 1 1 13 8.5 5.5 5.5 0 0 1 7.5 14Zm0-3A2.5 2.5 0 1 0 5 8.5 2.5 2.5 0 0 0 7.5 11ZM12 13l3 3 2-2 2 2-2 2 2 2-2 2-7-7 2-2Z"/></symbol>
      <symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 2 20 5v6c0 5-3.4 9.4-8 11-4.6-1.6-8-6-8-11V5l8-3Zm-1 13.6 6-6L15.6 8 11 12.6 8.4 10 7 11.4l4 4.2Z"/></symbol>
      <symbol id="i-volume" viewBox="0 0 24 24"><path d="M4 9v6h4l5 4V5L8 9H4Zm12.5-1.5-1.4 1.4a4 4 0 0 1 0 6.2l1.4 1.4a6 6 0 0 0 0-9Z"/></symbol>
      <symbol id="i-settings" viewBox="0 0 24 24"><path d="m19.4 13.5.1-1.5-.1-1.5 2-1.5-2-3.5-2.4 1a8 8 0 0 0-2.6-1.5L14 2h-4l-.4 2.5A8 8 0 0 0 7 6L4.6 5 2.6 8.5l2 1.5-.1 1.5.1 1.5-2 1.5 2 3.5 2.4-1a8 8 0 0 0 2.6 1.5L10 22h4l.4-2.5A8 8 0 0 0 17 18l2.4 1 2-3.5-2-1.5ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/></symbol>
    </svg>

    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">IVAC signin automation</p>
          <h1>VisaFlowX</h1>
        </div>
        <span id="stateBadge" class="state-badge idle">Idle</span>
      </header>

      <section class="panel dashboard" aria-labelledby="dashboardTitle">
        <div class="section-title">
          <svg><use href="#i-dashboard"></use></svg>
          <h2 id="dashboardTitle">Dashboard</h2>
          <span class="mini-badge">Automation Status</span>
        </div>
        <div class="status-grid">
          <article><span>Automation</span><strong id="stateText">Idle</strong></article>
          <article><span>Retry</span><strong id="retryCountdown">-</strong></article>
          <article><span>Verification</span><strong id="verificationState">Idle</strong></article>
          <article><span>OTP</span><strong id="otpState">Idle</strong></article>
          <article><span>Scheduler</span><strong id="schedulerState">Not scheduled</strong></article>
          <article><span>Page</span><strong id="currentPage">-</strong></article>
        </div>
        <div class="last-action">
          <span id="lastAction">Ready</span>
          <small id="lastError">-</small>
        </div>
      </section>

      <section class="panel quick-actions" aria-label="Quick Actions">
        <button id="startBtn" class="btn primary" type="button"><svg><use href="#i-play"></use></svg>Start Automation</button>
        <button id="stopBtn" class="btn secondary" type="button"><svg><use href="#i-stop"></use></svg>Stop Automation</button>
        <button id="quickSaveBtn" class="btn secondary" type="button"><svg><use href="#i-save"></use></svg>Save Credentials</button>
        <button id="scheduleBtn" class="btn secondary" type="button"><svg><use href="#i-clock"></use></svg>Schedule Run</button>
        <button id="testNotificationBtn" class="btn ghost" type="button"><svg><use href="#i-bell"></use></svg>Test Notification</button>
      </section>

      <section class="panel" aria-labelledby="credentialsTitle">
        <div class="section-title">
          <svg><use href="#i-key"></use></svg>
          <h2 id="credentialsTitle">Credentials</h2>
          <span id="credentialState" class="mini-badge">Not saved</span>
        </div>
        <div class="form-grid">
          <label>
            Contact Number
            <input id="contactNumber" type="tel" inputmode="tel" autocomplete="tel">
          </label>
          <label>
            Password
            <input id="password" type="password" autocomplete="current-password">
          </label>
        </div>
        <div class="button-row three">
          <button id="saveCredentialsBtn" class="btn primary" type="button">Save Credentials</button>
          <button id="updateCredentialsBtn" class="btn secondary" type="button">Update</button>
          <button id="clearCredentialsBtn" class="btn ghost" type="button">Clear</button>
        </div>
      </section>

      <section class="panel" aria-labelledby="schedulerTitle">
        <div class="section-title">
          <svg><use href="#i-clock"></use></svg>
          <h2 id="schedulerTitle">Scheduler</h2>
        </div>
        <div class="form-grid scheduler-grid">
          <label>
            Date
            <input id="scheduleDate" type="date">
          </label>
          <label>
            Time
            <input id="scheduleTime" type="time">
          </label>
          <label class="switch-row">
            <input id="scheduleEnabled" type="checkbox">
            <span>Enable Scheduler</span>
          </label>
        </div>
        <div class="preview-card">
          <span>Next Scheduled Run</span>
          <strong id="schedulePreview">Not scheduled</strong>
        </div>
        <button id="clearScheduleBtn" class="btn ghost wide-btn" type="button">Clear Schedule</button>
      </section>

      <section class="panel" aria-labelledby="notificationsTitle">
        <div class="section-title">
          <svg><use href="#i-bell"></use></svg>
          <h2 id="notificationsTitle">Notifications & Alarm</h2>
        </div>
        <div class="form-grid">
          <label class="switch-row">
            <input id="notificationsEnabled" type="checkbox">
            <span>Desktop notifications</span>
          </label>
          <label class="switch-row">
            <input id="soundEnabled" type="checkbox">
            <span>Looping alarm</span>
          </label>
          <label>
            Volume
            <input id="volume" type="range" min="0" max="1" step="0.05">
          </label>
        </div>
        <div class="button-row three">
          <button id="testAlarmBtn" class="btn secondary" type="button"><svg><use href="#i-volume"></use></svg>Test Alarm</button>
          <button id="muteAlarmBtn" class="btn ghost" type="button">Mute</button>
          <button id="stopAlarmBtn" class="btn ghost" type="button">Stop Alarm</button>
        </div>
      </section>

      <section class="panel compact-settings" aria-labelledby="settingsTitle">
        <div class="section-title">
          <svg><use href="#i-settings"></use></svg>
          <h2 id="settingsTitle">Settings</h2>
        </div>
        <div class="form-grid">
          <label>
            Retry Delay (seconds)
            <input id="baseDelay" type="number" min="1" max="3600">
          </label>
          <label>
            Recovery Mode
            <select id="refreshMode">
              <option value="soft">Reload page</option>
              <option value="hard">Hard refresh</option>
              <option value="none">No refresh</option>
            </select>
          </label>
        </div>
        <button id="saveSettingsBtn" class="btn secondary wide-btn" type="button">Save Settings</button>
      </section>
    </main>

    <div id="toastViewport" class="toast-viewport" aria-live="polite"></div>

    <script src="../utils/storage.js"></script>
    <script src="../utils/timers.js"></script>
    <script src="../utils/scheduler.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
